version: "3.9"

services:
  # =======================
  # LOCAL OLLAMA (EMBEDDINGS ONLY)
  # =======================
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # =======================
  # POSTGRES
  # =======================
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =======================
  # REDIS (OPTIONAL / FUTURE)
  # =======================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # =======================
  # RAG API
  # =======================
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =======================
  # MASTER SCRAPER (RUN ONCE)
  # =======================
  bulk-ingest:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    env_file:
      - .env
    environment:
      RAG_INGEST_URL: http://rag-api:8000/ingest
    depends_on:
      rag-api:
        condition: service_healthy
    volumes:
      - ./scraper_dedup.db:/app/scraper_dedup.db
      - ./logs:/app/logs
    command: python master_scraper.py
    restart: "no"

  # =======================
  # DYNAMIC SCRAPER (FOREVER)
  # =======================
  dynamic-scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    env_file:
      - .env
    environment:
      RAG_INGEST_URL: http://rag-api:8000/ingest
    depends_on:
      bulk-ingest:
        condition: service_completed_successfully
    volumes:
      - ./scraper_dedup.db:/app/scraper_dedup.db
      - ./logs:/app/logs
    command: python dynamic_scraper.py
    restart: unless-stopped

  # =======================
  # FRONTEND
  # =======================
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      rag-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:

